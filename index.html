// ── REDUCER ───────────────────────────────────────────────────────────────────
function reducer(s,a){
  let n;
  switch(a.type){
    case"ADD_TASK":   n={...s,tasks:[...s.tasks,a.p]};break;
    case"DEL_TASK":   n={...s,tasks:s.tasks.filter(t=>t.id!==a.id)};break;
    case"UPD_TASK":   n={...s,tasks:s.tasks.map(t=>t.id===a.id?{...t,...a.ch}:t)};break;
    case"ADD_SUB":    n={...s,submissions:[...s.submissions,a.p]};break;
    case"UPD_SUB":    n={...s,submissions:s.submissions.map(x=>x.id===a.id?{...x,status:a.st}:x)};break;
    case"ADD_NOTIF":  n={...s,notifications:[...s.notifications,a.p]};break;
    case"READ_NOTIF": n={...s,notifications:s.notifications.map(x=>x.id===a.id?{...x,read:true}:x)};break;
    case"ADD_ANN":    n={...s,announcements:[...s.announcements,a.p]};break;
    case"ADD_USER":   n={...s,users:[...s.users,a.p]};break;
    case"DEL_USER":   n={...s,users:s.users.filter(u=>u.id!==a.id)};break;
    case"UPD_USER":   n={...s,users:s.users.map(u=>u.id===a.id?{...u,...a.ch}:u)};break;
    case"PUNCH_IN":   n={...s,attendance:[...s.attendance,a.p]};break;
    case"PUNCH_OUT":  n={...s,attendance:s.attendance.map(x=>x.id===a.id?{...x,logoutTime:a.out,hoursWorked:a.hw}:x)};break;
    case"FIX_ATT":    n={...s,attendance:s.attendance.map(x=>x.id===a.id?{...x,...a.ch}:x)};break;
    case"DEL_ATT":    n={...s,attendance:s.attendance.filter(x=>x.id!==a.id)};break;
    case"ADD_LEAVE":  n={...s,leaves:[...s.leaves,a.p]};break;
    case"REV_LEAVE":  n={...s,leaves:s.leaves.map(l=>l.id===a.id?{...l,status:a.st,reviewedBy:a.by}:l)};break;
    case"ADD_IG":     n={...s,igPages:[...s.igPages,a.p]};break;
    case"DEL_IG":     n={...s,igPages:s.igPages.filter(p=>p.id!==a.id)};break;
    case"UPD_IG":     n={...s,igPages:s.igPages.map(p=>p.id===a.id?{...p,...a.ch}:p)};break;
    case"ADD_MSG":    n={...s,messages:[...(s.messages||[]),a.p]};break;
    case"READ_MSG":   n={...s,messages:(s.messages||[]).map(m=>m.id===a.id?{...m,read:true}:m)};break;
    default:return s;
  }
  saveData(n);return n;
}

// ── SUBMIT WORK FORM (shared by EMP and TL) ───────────────────────────────────
function WorkSubmitForm({me,data,dispatch,isTL}){
  const tl=data.users.find(u=>u.id===me.tlId);
  const dept=me.dept||"Content";
  const ctypes=getContentTypes(dept);
  const[sDate,setSDate]=useState(today());
  const[sType,setSType]=useState(ctypes[0]);
  const[sCount,setSCount]=useState("1");
  const[sPage,setSPage]=useState(IG_PAGES[0]);
  const[sRemarks,setSRemarks]=useState("");

  const submit=()=>{
    if(!sDate||!sType||!sPage){alert("Fill all required fields");return;}
    const count=parseInt(sCount)||1;
    const tlName=isTL?me.name:(tl?.name||"");
    const title=`${sType} ×${count} — ${sPage}`;
    dispatch({type:"ADD_SUB",p:{id:newId(),empId:me.id,type:sType,title,link:sRemarks,taskId:null,status:"Pending",submittedAt:new Date().toLocaleString(),note:sRemarks}});
    const notify=isTL?data.users.find(u=>u.role==="Manager"||u.role==="Admin"):tl;
    if(notify)dispatch({type:"ADD_NOTIF",p:{id:newId(),toId:notify.id,fromName:me.name,msg:`📤 ${me.name}: ${sType} ×${count} on ${sPage}`,read:false,ts:new Date().toLocaleString()}});
    syncToSheet("WORK_SUBMIT",{date:sDate,teamLeader:tlName,employeeName:me.name,contentType:sType,workCount:count,pageName:sPage,remarks:sRemarks});
    setSCount("1");setSPage(IG_PAGES[0]);setSRemarks("");
    alert("✅ Submitted & synced to Google Sheet!");
  };

  return(
    <Card>
      <div style={{fontWeight:700,fontSize:14,color:C.text,marginBottom:16}}>📤 Submit Work</div>
      <Inp label="Date" value={sDate} onChange={setSDate} type="date"/>
      <ReadOnly label="Team Leader" value={isTL?`${me.name} (You)`:tl?.name||"—"}/>

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function Login({users,onLogin}){
  const[sel,setSel]=useState("");const[pin,setPin]=useState("");const[err,setErr]=useState("");
  const[tries,setTries]=useState(0);const[locked,setLocked]=useState(false);
  const ref=useRef(null);
  useEffect(()=>()=>clearTimeout(ref.current),[]);
  const go=()=>{
    if(locked){setErr("Locked. Wait 30s.");return;}
    if(sel==="guest"){onLogin({id:"guest",name:"Guest",role:"Guest",avatar:"G",dept:"—",pin:""});return;}
    if(!SEC.validPin(pin)){setErr("PIN must be 4–8 digits");return;}
    const u=users.find(u=>u.id===Number(sel));
    if(!u){setErr("Select a user");return;}
    const ok=u.pin.length===pin.length&&[...u.pin].every((c,i)=>c===pin[i]);
    if(!ok){
      const n=tries+1;setTries(n);
      if(n>=5){setLocked(true);setErr("5 failed attempts. Locked 30s.");ref.current=setTimeout(()=>{setLocked(false);setTries(0);setErr("");},30000);}
      else setErr(`Wrong PIN — ${5-n} left`);
      return;
    }
    createSession(u.id);setTries(0);onLogin(u);
  };
  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0F172A 0%,#1E3A5F 40%,#312E81 100%)",display:"flex",alignItems:"center",justifyContent:"center",padding:20,fontFamily:"-apple-system,BlinkMacSystemFont,'Inter',sans-serif"}}>
      <div style={{background:"rgba(255,255,255,0.06)",backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",borderRadius:20,padding:36,width:"100%",maxWidth:400,border:"1px solid rgba(255,255,255,0.12)",boxShadow:"0 32px 64px rgba(0,0,0,0.4)"}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{width:64,height:64,background:"linear-gradient(135deg,#4F46E5,#7C3AED)",borderRadius:18,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,margin:"0 auto 16px",boxShadow:"0 8px 32px rgba(79,70,229,0.4)"}}>🎯</div>
          <div style={{fontWeight:900,fontSize:26,color:"#fff",letterSpacing:"-.5px"}}>WooHoo Media</div>
          <div style={{fontSize:13,color:"rgba(255,255,255,.4)",marginTop:5,letterSpacing:".5px"}}>Manipulating Internet</div>
        </div>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:11,color:"rgba(255,255,255,.45)",marginBottom:6,fontWeight:600,textTransform:"uppercase",letterSpacing:".6px"}}>Account</div>
          <select value={sel} onChange={e=>{setSel(e.target.value);setErr("");setPin("");}} style={{width:"100%",background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:10,padding:"11px 12px",color:sel?"#fff":"rgba(255,255,255,.4)",fontSize:13,outline:"none",boxSizing:"border-box",fontFamily:"inherit",appearance:"none",cursor:"pointer"}}>
            <option value="" style={{background:"#1E3A5F",color:"#fff"}}>— Choose account —</option>
            {users.map(u=><option key={u.id} value={u.id} style={{background:"#1E3A5F",color:"#fff"}}>{u.name} [{u.role}]</option>)}
            <option value="guest" style={{background:"#1E3A5F",color:"#fff"}}>👁 Guest (View Only)</option>
          </select>
        </div>
        {sel&&sel!=="guest"&&(
          <div style={{marginBottom:14}}>
            <div style={{fontSize:11,color:"rgba(255,255,255,.45)",marginBottom:6,fontWeight:600,textTransform:"uppercase",letterSpacing:".6px"}}>PIN</div>
            <input value={pin} type="password" maxLength={SEC.PIN_MAX} autoComplete="off" placeholder="••••••"
              onChange={e=>{if(e.target.value.length<=SEC.PIN_MAX){setPin(e.target.value);setErr("");}}}
              onKeyDown={e=>e.key==="Enter"&&go()}
              style={{width:"100%",background:"rgba(255,255,255,0.08)",border:`1px solid ${locked?"rgba(225,29,72,.6)":"rgba(255,255,255,0.15)"}`,borderRadius:10,padding:"11px 12px",color:"#fff",fontSize:16,outline:"none",boxSizing:"border-box",fontFamily:"inherit",letterSpacing:"4px"}}/>
          </div>
        )}
        {sel==="guest"&&<div style={{background:"rgba(79,70,229,0.15)",border:"1px solid rgba(79,70,229,0.3)",borderRadius:10,padding:"10px 14px",fontSize:12,color:"rgba(165,180,252,1)",marginBottom:14}}>View-only access. You can message the Manager.</div>}
        {err&&<div style={{background:"rgba(225,29,72,0.15)",border:"1px solid rgba(225,29,72,0.3)",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#FCA5A5",marginBottom:12}}>{err}</div>}
        <button disabled={locked||!sel} onClick={go} style={{width:"100%",padding:"12px",borderRadius:10,border:"none",background:locked||!sel?"rgba(255,255,255,0.08)":"linear-gradient(135deg,#4F46E5,#7C3AED)",color:locked||!sel?"rgba(255,255,255,.3)":"#fff",fontWeight:700,fontSize:14,cursor:locked||!sel?"not-allowed":"pointer",fontFamily:"inherit",boxShadow:locked||!sel?"none":"0 4px 24px rgba(79,70,229,0.4)"}}>
          {sel==="guest"?"Enter as Guest →":"Sign In →"}
        </button>
      </div>
    </div>
  );
}

// ── BELL ──────────────────────────────────────────────────────────────────────

        🔔{unread>0&&<span style={{position:"absolute",top:-5,right:-5,background:"#E11D48",color:"#fff",borderRadius:"50%",width:17,height:17,fontSize:9,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,border:"2px solid #0F172A"}}>{unread}</span>}

// ── LEAVE BLOCK ───────────────────────────────────────────────────────────────
function LeaveBlock({data,me,dispatch,ro}){
  const[lt,setLt]=useState("apply");
  const[lFrom,setLFrom]=useState("");const[lTo,setLTo]=useState("");
  const[lType,setLType]=useState("Casual");const[lReason,setLReason]=useState("");
  const myL=data.leaves.filter(l=>l.userId===me.id);
  const apply=()=>{
    const reason=SEC.sanitize(lReason,SEC.NOTE_MAX);
    if(!lFrom||!lTo||!reason){alert("Fill all fields");return;}
    if(lTo<lFrom){alert("End date must be after start");return;}
    const days=Math.max(1,Math.round((new Date(lTo)-new Date(lFrom))/864e5)+1);
    dispatch({type:"ADD_LEAVE",p:{id:newId(),userId:me.id,from:lFrom,to:lTo,days,reason,type:lType,status:"Pending",appliedAt:today(),reviewedBy:null}});
    const mgr=data.users.find(u=>u.role==="Manager"||u.role==="Admin");
    if(mgr)dispatch({type:"ADD_NOTIF",p:{id:newId(),toId:mgr.id,fromName:me.name,msg:`🏖 Leave: ${me.name} ${lFrom}→${lTo} (${days}d, ${lType})`,read:false,ts:new Date().toLocaleString()}});
    syncToSheet("LEAVE",{appliedAt:today(),employeeName:me.name,type:lType,from:lFrom,to:lTo,days,reason,status:"Pending",reviewedBy:""});
    setLFrom("");setLTo("");setLReason("");setLt("history");
  };
  return(
    <div>
      <Stats items={[{l:"Applied",v:myL.length,c:C.blue},{l:"Approved Days",v:myL.filter(l=>l.status==="Approved").reduce((s,l)=>s+l.days,0),c:C.green},{l:"Pending",v:myL.filter(l=>l.status==="Pending").length,c:C.yellow}]}/>
      {!ro&&<div style={{display:"flex",gap:8,marginBottom:12}}>{["apply","history"].map(t=><button key={t} onClick={()=>setLt(t)} style={{flex:1,padding:"7px",borderRadius:6,border:`1px solid ${lt===t?C.accent:C.border2}`,background:lt===t?C.accentL:C.white,color:lt===t?C.accent:C.sub,fontWeight:600,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>{t==="apply"?"+ Apply Leave":"My History"}</button>)}</div>}
      {lt==="apply"&&!ro&&<Card><Inp label="Leave Type" value={lType} onChange={setLType} opts={LTYPES}/><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><Inp label="From" value={lFrom} onChange={setLFrom} type="date"/><Inp label="To" value={lTo} onChange={setLTo} type="date"/></div>{lFrom&&lTo&&lTo>=lFrom&&<div style={{background:C.accentL,border:`1px solid ${C.accent}30`,borderRadius:6,padding:"7px 10px",fontSize:12,color:C.accent,marginBottom:10}}>{Math.max(1,Math.round((new Date(lTo)-new Date(lFrom))/864e5)+1)} day(s)</div>}<Inp label="Reason" value={lReason} onChange={setLReason} placeholder="Brief reason..." rows={2} max={SEC.NOTE_MAX}/><Btn onClick={apply} full>Submit Leave Request</Btn></Card>}
      {(lt==="history"||ro)&&(myL.length===0?<Empty icon="📋" msg="No leaves yet"/>:myL.slice().reverse().map(l=>(
        <Card key={l.id} style={{marginBottom:8}} left={lvColor(l.status)}>
          <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:5}}><Bdg label={l.type} color={C.blue}/><Bdg label={l.status} color={lvColor(l.status)}/><Bdg label={`${l.days}d`} color={C.muted}/></div>
          <div style={{fontSize:13,fontWeight:600,color:C.text}}>{l.from} → {l.to}</div>
          <div style={{fontSize:11,color:C.sub,marginTop:2}}>{l.reason}</div>
          {l.reviewedBy&&<div style={{fontSize:10,color:C.muted,marginTop:2}}>by {l.reviewedBy}</div>}
        </Card>
      )))}
    </div>
  );
}

// ── TL DASHBOARD ──────────────────────────────────────────────────────────────
function TLDash({data,me,dispatch}){
  const[tab,setTab]=useState("mytasks");
  const[aTitle,setATitle]=useState("");const[aType,setAType]=useState(getContentTypes(me.dept||"Content")[0]);
  const[aPri,setAPri]=useState("Medium");const[aTo,setATo]=useState("");const[aDue,setADue]=useState("");const[aNote,setANote]=useState("");
  const myTeam=data.users.filter(u=>u.tlId===me.id);
  const toMe=data.tasks.filter(t=>t.assignedTo===me.id);
  const byMe=data.tasks.filter(t=>t.assignedBy===me.id);
  const tSubs=data.submissions.filter(s=>myTeam.map(u=>u.id).includes(s.empId));
  const ctypes=getContentTypes(me.dept||"Content");
  const assign=()=>{
    const title=SEC.sanitize(aTitle,120),note=SEC.sanitize(aNote,500);
    if(!title||!aTo||!aDue){alert("Fill title, assignee and due date");return;}
    dispatch({type:"ADD_TASK",p:{id:newId(),title,type:aType,priority:aPri,assignedTo:Number(aTo),assignedBy:me.id,dueDate:aDue,status:"Pending",note,createdAt:today()}});
    dispatch({type:"ADD_NOTIF",p:{id:newId(),toId:Number(aTo),fromName:me.name,msg:`${aPri==="High"?"🔴 PRIORITY":"📌"}: ${title} — due ${aDue}`,read:false,ts:new Date().toLocaleString()}});
    setATitle("");setANote("");setADue("");setTab("teamtasks");
  };
  const pend=toMe.filter(t=>t.status!=="Done").length;
  const TABS=[{k:"mytasks",label:`My Tasks${pend>0?` (${pend})`:""}`},{k:"mywork",label:"Submit My Work"},{k:"assign",label:"Assign"},{k:"teamtasks",label:"Team Tasks"},{k:"review",label:`Review (${tSubs.filter(s=>s.status==="Pending").length})`},{k:"team",label:"Team"},{k:"att",label:"Attendance"},{k:"leave",label:"Leave"}];
  return(
    <div>
      <Stats items={[{l:"My Tasks",v:toMe.length,c:C.orange},{l:"Team Tasks",v:byMe.length,c:C.accent},{l:"Pending Review",v:tSubs.filter(s=>s.status==="Pending").length,c:C.yellow},{l:"Team Size",v:myTeam.length,c:C.purple}]}/>
      <Tabs tabs={TABS} active={tab} onChange={setTab}/>
      {tab==="mytasks"&&(toMe.length===0?<Empty icon="🎯" msg="No tasks from manager"/>:toMe.slice().reverse().map(t=><TaskCard key={t.id} task={t} users={data.users} me={me} dispatch={dispatch}/>))}
      {tab==="mywork"&&<WorkSubmitForm me={me} data={data} dispatch={dispatch} isTL={true}/>}
      {tab==="assign"&&(
        <Card>
          <div style={{fontWeight:600,fontSize:14,color:C.text,marginBottom:14}}>Assign Task to Team Member</div>
          <Inp label="Task Title" value={aTitle} onChange={setATitle} placeholder="Task description..." max={120}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><Inp label="Type" value={aType} onChange={setAType} opts={ctypes}/><Inp label="Priority" value={aPri} onChange={setAPri} opts={PRIS}/></div>
          {myTeam.length>0?<Inp label="Assign To" value={aTo} onChange={setATo} opts={[{v:"",l:"— Select —"},...myTeam.map(u=>({v:u.id,l:u.name}))]}/>:<div style={{background:C.yellowL,border:`1px solid ${C.yellow}30`,borderRadius:6,padding:"8px 12px",fontSize:12,color:C.yellow,marginBottom:10}}>No team members yet.</div>}
          <Inp label="Due Date" value={aDue} onChange={setADue} type="date"/>
          <Inp label="Notes" value={aNote} onChange={setANote} placeholder="Instructions..." rows={2} max={500}/>
          <Btn onClick={assign} full disabled={myTeam.length===0||!aTo}>Assign &amp; Notify</Btn>
        </Card>
      )}
      {tab==="teamtasks"&&(byMe.length===0?<Empty icon="📋" msg="No tasks assigned yet"/>:byMe.slice().reverse().map(t=><TaskCard key={t.id} task={t} users={data.users} me={me} dispatch={dispatch}/>))}
      {tab==="review"&&(tSubs.length===0?<Empty icon="👁" msg="No submissions"/>:tSubs.slice().reverse().map(s=><SubCard key={s.id} sub={s} users={data.users} me={me} dispatch={dispatch}/>))}
      {tab==="team"&&(myTeam.length===0?<Empty icon="👥" msg="No team members"/>:myTeam.map(emp=>{
        const et=data.tasks.filter(t=>t.assignedTo===emp.id),dn=et.filter(t=>t.status==="Done").length,pc=et.length?Math.round(dn/et.length*100):0;
        const at=data.attendance.find(a=>a.userId===emp.id&&a.date===today());
        return(<Card key={emp.id} style={{marginBottom:8,padding:"10px 14px"}}><div style={{display:"flex",gap:10,alignItems:"center"}}><Av name={emp.avatar} color={C.green} size={36}/><div style={{flex:1}}><div style={{fontWeight:600,color:C.text,fontSize:13}}>{emp.name} <Bdg label="EMP" color={C.green}/></div><div style={{fontSize:11,color:at?C.green:C.muted,marginTop:2}}>{at?`🟢 ${at.wfh?"WFH":"Office"} · In ${at.loginTime}`:"⚪ Not in today"}</div><div style={{height:3,borderRadius:3,background:C.border,marginTop:6}}><div style={{width:`${pc}%`,height:3,borderRadius:3,background:C.green}}/></div><div style={{fontSize:10,color:C.muted,marginTop:2}}>{dn}/{et.length} tasks · {pc}%</div></div></div></Card>);
      }))}
      {tab==="att"&&<AttBlock data={data} me={me} dispatch={dispatch}/>}
      {tab==="leave"&&<LeaveBlock data={data} me={me} dispatch={dispatch}/>}
    </div>
  );
}

// ── MANAGER / ADMIN / GUEST DASHBOARD ─────────────────────────────────────────
function MgrDash({data,me,dispatch,ro}){
  const[tab,setTab]=useState("overview");
  const[atT,setAtT]=useState("");const[atTy,setAtTy]=useState("Carousel");const[atPr,setAtPr]=useState("High");const[atTo,setAtTo]=useState("");const[atD,setAtD]=useState("");const[atN,setAtN]=useState("");
  const[ann,setAnn]=useState("");
  const[uN,setUN]=useState("");const[uR,setUR]=useState("EMP");const[uD,setUD]=useState("Content");const[uTL,setUTL]=useState("");const[uP,setUP]=useState("");
  const[lF,setLF]=useState("Pending");
  const[aD,setAD]=useState(today());const[aU,setAU]=useState("all");const[fixA,setFixA]=useState(null);
  const[editU,setEditU]=useState(null);
  const[cp,setCp]=useState({old:"",n1:"",n2:""});
  const[myName,setMyName]=useState(me.name);
  const[myDept,setMyDept]=useState(me.dept);
  const[gMsg,setGMsg]=useState("");
  const tls=data.users.filter(u=>u.role==="TL");
  const emps=data.users.filter(u=>u.role==="EMP");
  const nonMgr=data.users.filter(u=>u.role!=="Manager"&&u.role!=="Admin");
  const pendL=data.leaves.filter(l=>l.status==="Pending").length;
  const todayA=data.attendance.filter(a=>a.date===today());
  const fAtt=data.attendance.filter(a=>(aD?a.date===aD:true)&&(aU==="all"?true:a.userId===Number(aU)));
  const fLeaves=lF==="All"?data.leaves:data.leaves.filter(l=>l.status===lF);
  const guestMsgs=(data.messages||[]).filter(m=>m.toId===me.id);
  const isGuest=me.role==="Guest";
  const isAdmin=me.role==="Admin";

  const doAssignTL=()=>{
    const title=SEC.sanitize(atT,120),note=SEC.sanitize(atN,500);
    if(!title||!atTo||!atD){alert("Fill all fields");return;}
    dispatch({type:"ADD_TASK",p:{id:newId(),title,type:atTy,priority:atPr,assignedTo:Number(atTo),assignedBy:me.id,dueDate:atD,status:"Pending",note,createdAt:today()}});
    dispatch({type:"ADD_NOTIF",p:{id:newId(),toId:Number(atTo),fromName:me.name,msg:`🔴 ${me.name}: ${title} — due ${atD}`,read:false,ts:new Date().toLocaleString()}});
    setAtT("");setAtN("");setAtD("");setAtTo("");
  };
  const doAnn=()=>{
    const msg=SEC.sanitize(ann,400);if(!msg)return;
    dispatch({type:"ADD_ANN",p:{id:newId(),from:me.name,msg,ts:new Date().toLocaleString()}});
    data.users.filter(u=>u.id!==me.id).forEach(u=>dispatch({type:"ADD_NOTIF",p:{id:newId(),toId:u.id,fromName:me.name,msg:`📢 ${msg}`,read:false,ts:new Date().toLocaleString()}}));
    setAnn("");
  };
  const doAddUser=()=>{
    const name=SEC.sanitize(uN,60);
    if(!name||!uP){alert("Name and PIN required");return;}
    if(!SEC.validPin(uP)){alert("PIN must be 4–8 digits");return;}
    if(data.users.some(u=>u.pin===uP)){alert("PIN taken");return;}
    if(uR==="EMP"&&!uTL){alert("Select a TL");return;}
    dispatch({type:"ADD_USER",p:{id:newId(),name,role:uR,dept:uD,avatar:name.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2),pin:uP,tlId:uR==="EMP"&&uTL?Number(uTL):undefined}});
    setUN("");setUP("");setUTL("");
  };
  const doRevLeave=(id,st)=>{
    dispatch({type:"REV_LEAVE",id,st,by:me.name});
    const l=data.leaves.find(x=>x.id===id);
    if(l){
      dispatch({type:"ADD_NOTIF",p:{id:newId(),toId:l.userId,fromName:me.name,msg:`${st==="Approved"?"✅":"❌"} Leave ${l.from}→${l.to} ${st}`,read:false,ts:new Date().toLocaleString()}});
      syncToSheet("LEAVE",{appliedAt:l.appliedAt,employeeName:data.users.find(u=>u.id===l.userId)?.name||"",type:l.type,from:l.from,to:l.to,days:l.days,reason:l.reason,status:st,reviewedBy:me.name});
    }
  };
  const doChangePin=()=>{
    if(!cp.old||!cp.n1||!cp.n2){alert("Fill all fields");return;}
    if(me.pin!==cp.old){alert("Current PIN incorrect");return;}
    if(!SEC.validPin(cp.n1)){alert("New PIN must be 4–8 digits");return;}
    if(cp.n1!==cp.n2){alert("PINs do not match");return;}
    if(data.users.some(u=>u.id!==me.id&&u.pin===cp.n1)){alert("PIN already in use");return;}
    dispatch({type:"UPD_USER",id:me.id,ch:{pin:cp.n1}});
    me.pin=cp.n1;setCp({old:"",n1:"",n2:""});alert("PIN updated!");
  };
  const doGuestMsg=()=>{
    const msg=SEC.sanitize(gMsg,400);if(!msg)return;
    const mgr=data.users.find(u=>u.role==="Manager"||u.role==="Admin");
    dispatch({type:"ADD_MSG",p:{id:newId(),fromId:"guest",fromName:"Guest",toId:mgr?.id,msg,ts:new Date().toLocaleString(),read:false}});
    if(mgr)dispatch({type:"ADD_NOTIF",p:{id:newId(),toId:mgr.id,fromName:"Guest",msg:`💬 Guest: ${msg}`,read:false,ts:new Date().toLocaleString()}});
    setGMsg("");
  };

  const TABS=[
    {k:"overview",label:"Overview"},{k:"tasks",label:"Tasks"},{k:"subs",label:"Submissions"},
    {k:"att",label:"Attendance"},{k:"leaves",label:`Leaves${pendL>0?` (${pendL})`:""}`},
    {k:"team",label:"Team"},{k:"ig",label:"Instagram"},{k:"announce",label:"Announce"},
    ...(isGuest?[{k:"message",label:"Message Manager"}]:[]),
    ...(!ro&&guestMsgs.length>0?[{k:"inbox",label:`Inbox${guestMsgs.filter(m=>!m.read).length>0?` (${guestMsgs.filter(m=>!m.read).length})`:""}`}]:[]),
    ...(isAdmin?[{k:"adminpanel",label:"⚙ Admin"}]:[]),
    ...(!ro?[{k:"account",label:"My Account"}]:[]),
  ];

  return(
    <div>
      <Stats items={[{l:"Total Tasks",v:data.tasks.length,c:C.accent},{l:"Done",v:data.tasks.filter(t=>t.status==="Done").length,c:C.green},{l:"Leave Reqs",v:pendL,c:C.yellow},{l:"IG Pages",v:data.igPages.length,c:C.pink}]}/>
      <Tabs tabs={TABS} active={tab} onChange={setTab}/>

      {tab==="overview"&&(
        <div>
          {["Content","Video","Research"].map(dept=>{
            const dt=data.tasks.filter(t=>{const u=data.users.find(x=>x.id===t.assignedTo);return u?.dept===dept;});
            const dn=dt.filter(t=>t.status==="Done").length,pc=dt.length?Math.round(dn/dt.length*100):0;
            return(<Card key={dept} style={{marginBottom:8,padding:"12px 14px"}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:8,alignItems:"center"}}><span style={{fontWeight:600,color:C.text,fontSize:13}}>{dept}</span><span style={{color:C.accent,fontWeight:700}}>{pc}%</span></div><div style={{height:4,borderRadius:4,background:C.border}}><div style={{width:`${pc}%`,height:4,borderRadius:4,background:C.accent,transition:"width 1s ease"}}/></div><div style={{fontSize:11,color:C.muted,marginTop:4}}>{dn} of {dt.length} tasks done</div></Card>);
          })}
          {data.announcements.slice(-1).map(a=><Card key={a.id} style={{marginTop:8,padding:"12px 14px"}} left={C.accent}><div style={{fontSize:11,fontWeight:600,color:C.accent,marginBottom:4}}>Latest Announcement</div><div style={{fontSize:13,color:C.text}}>{a.msg}</div><div style={{fontSize:10,color:C.muted,marginTop:4}}>{a.from} · {a.ts}</div></Card>)}
        </div>
      )}

      {tab==="tasks"&&(
        <div>
          {!ro&&<Card style={{marginBottom:14}}>
            <div style={{fontWeight:600,fontSize:14,color:C.text,marginBottom:14}}>Assign Task to [TL]</div>
            <Inp label="Title" value={atT} onChange={setAtT} placeholder="Task title..." max={120}/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><Inp label="Type" value={atTy} onChange={setAtTy} opts={["Carousel","Static","Main Video","Top 5 News","Complete Scripts","Research","Voiceover"]}/><Inp label="Priority" value={atPr} onChange={setAtPr} opts={PRIS}/></div>
            <Inp label="Assign To [TL]" value={atTo} onChange={setAtTo} opts={[{v:"",l:"— Select TL —"},...tls.map(u=>({v:u.id,l:`${u.name} (${u.dept})`}))]}/>

            <Inp label="Type" value={fixA.wfh?"wfh":"office"} onChange={v=>setFixA(p=>({...p,wfh:v==="wfh"}))} opts={[{v:"office",l:"🏢 Office"},{v:"wfh",l:"🏠 Work from Home"}]}/>

          {(data.messages||[]).filter(m=>m.fromId==="guest").slice().reverse().map(m=><Card key={m.id} style={{marginBottom:6,padding:"10px 14px"}}><div style={{fontSize:12,color:C.text}}>{m.msg}</div><div style={{fontSize:10,color:C.muted,marginTop:2}}>{m.ts}</div></Card>)}

            {uR==="EMP"&&<Inp label="Under [TL]" value={uTL} onChange={setUTL} opts={[{v:"",l:"— Select TL —"},...tls.map(u=>({v:u.id,l:`${u.name} (${u.dept})`}))]}/>}
            <Inp label="Login PIN (4–8 digits)" value={uP} onChange={setUP} placeholder="e.g. 9999" type="password" max={8}/>
            <Btn onClick={doAddUser} full>Add Member</Btn>
          </Card>
          <div style={{fontSize:11,color:C.muted,fontWeight:600,textTransform:"uppercase",letterSpacing:".5px",marginBottom:10}}>All Users — {data.users.length} total</div>
          {["Admin","Manager","TL","EMP"].map(role=>{
            const group=data.users.filter(u=>u.role===role);
            if(!group.length)return null;

// ── APP ROOT ──────────────────────────────────────────────────────────────────
function App(){
  const[data,setData]=useState(()=>loadData());
  const[me,setMe]=useState(null);
  const dispatch=a=>setData(p=>reducer(p,a));
  const login=u=>{if(u.role!=="Guest")createSession(u.id);setMe(u);};
  const logout=()=>{destroySession();setMe(null);};

  useEffect(()=>{
    if(!me||me.role==="Guest")return;
    const iv=setInterval(()=>{if(!validSession(me.id)){destroySession();setMe(null);}},60000);
    return()=>clearInterval(iv);
  },[me]);

  if(!me){return <Login users={data.users} onLogin={login}/>;}
  if(me.role!=="Guest"&&!validSession(me.id)){destroySession();return <Login users={data.users} onLogin={login}/>;}

  const ro=me.role==="Guest";

  return(
    <div style={{minHeight:"100vh",background:"#F1F5F9",fontFamily:"-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif",color:C.text}}>
      {/* NAV */}
      <div style={{background:"linear-gradient(90deg,#0F172A 0%,#1E3A5F 100%)",padding:"0 20px",display:"flex",alignItems:"center",gap:12,height:54,position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 16px rgba(0,0,0,0.3)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:30,height:30,background:"linear-gradient(135deg,#4F46E5,#7C3AED)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,boxShadow:"0 4px 12px rgba(79,70,229,0.4)"}}>🎯</div>
          <div>
            <div style={{fontWeight:800,fontSize:14,color:"#fff",letterSpacing:"-.3px",lineHeight:1}}>WooHoo Media</div>
            <div style={{fontSize:9,color:"rgba(255,255,255,.35)",letterSpacing:".5px"}}>Manipulating Internet</div>
          </div>
        </div>
        <div style={{flex:1}}/>
        {ro&&<span style={{background:"rgba(234,88,12,.2)",color:"#FDBA74",padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:600,border:"1px solid rgba(234,88,12,.3)"}}>Guest</span>}
        {me.role==="Admin"&&<span style={{background:"rgba(124,58,237,.2)",color:"#C4B5FD",padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:600,border:"1px solid rgba(124,58,237,.3)"}}>Admin</span>}
        <Bell notifs={data.notifications} uid={me.id} onRead={id=>dispatch({type:"READ_NOTIF",id})}/>
        <div style={{display:"flex",alignItems:"center",gap:8,background:"rgba(255,255,255,0.08)",borderRadius:8,padding:"4px 10px",border:"1px solid rgba(255,255,255,0.1)"}}>
          <div style={{width:24,height:24,borderRadius:"50%",background:"linear-gradient(135deg,#4F46E5,#7C3AED)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:800,color:"#fff"}}>{me.avatar}</div>
          <span style={{fontSize:12,color:"rgba(255,255,255,.8)",fontWeight:500}}>{me.name}</span>
        </div>
        <button onClick={logout} style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:6,padding:"5px 11px",color:"rgba(255,255,255,.6)",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Sign out</button>
      </div>

      {/* HERO */}
      <div style={{background:"linear-gradient(135deg,#1E3A5F 0%,#312E81 100%)",padding:"16px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
        <div>
          <div style={{fontWeight:800,fontSize:17,color:"#fff"}}>{me.name}</div>
          <div style={{fontSize:12,color:"rgba(255,255,255,.5)",marginTop:3,display:"flex",alignItems:"center",gap:6}}>
            <span>{me.dept}</span>
            <span style={{background:`${roleColor(me.role)}30`,color:roleColor(me.role),padding:"1px 8px",borderRadius:20,fontSize:11,fontWeight:600}}>[{me.role}]</span>
          </div>
        </div>
        {data.announcements.length>0&&(
          <div style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:10,padding:"8px 14px",maxWidth:280}}>
            <div style={{fontSize:10,color:"rgba(165,243,252,1)",fontWeight:600,marginBottom:2}}>📢 Announcement</div>
            <div style={{fontSize:12,color:"rgba(255,255,255,.75)",lineHeight:1.4}}>{data.announcements[data.announcements.length-1].msg}</div>
          </div>
        )}
      </div>

      {/* CONTENT */}
      <div style={{maxWidth:720,margin:"0 auto",padding:"18px 14px 60px"}}>
        {me.role==="EMP"&&<EmpDash data={data} me={me} dispatch={dispatch}/>}
        {me.role==="TL"&&<TLDash data={data} me={me} dispatch={dispatch}/>}
        {(me.role==="Manager"||me.role==="Admin"||me.role==="Guest")&&<MgrDash data={data} me={me} dispatch={dispatch} ro={ro}/>}
      </div>
    </div>
  );
}
</script>
<script>
  window.addEventListener('load',function(){
    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  });
</script>
</body>
</html>
